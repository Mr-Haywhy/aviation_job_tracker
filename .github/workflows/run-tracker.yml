name: Daily Aviation Portal Tracker

on:
  schedule:
    - cron: '0 8 * * *'  # Runs automatically every day at 6:00 AM UTC
  workflow_dispatch:     # Allows you to trigger the scan manually anytime

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install beautifulsoup4 requests

      - name: Run Script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python tracker.py
